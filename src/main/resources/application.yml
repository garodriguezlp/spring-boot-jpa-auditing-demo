spring:
  application:
    name: spring-auditing

  datasource:
    url: jdbc:h2:mem:auditingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.data.auditing: TRACE
    org.springframework.data.jpa.domain.support.AuditingEntityListener: TRACE
